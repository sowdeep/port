<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sudip — Poetry</title>

<style>
  
:root{
  --bg:#f6f1e9;
  --panel:rgba(251,248,243,0.9);
  --paper:#fffdf9;
  --ink:#1f2328;
  --muted:#6d6d73;
}

/* 🌙 DARK MODE VARIABLES */
body.dark{
  --bg:#121212;
  --panel:#1e1e1e;
  --paper:#1a1a1a;
  --ink:#f5f5f5;
  --muted:#a0a0a0;
}

/* Base */
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:-apple-system,Segoe UI,Roboto;
  background:linear-gradient(180deg,#fcfbf8,var(--bg));
  color:var(--ink);
  transition:0.3s;
}

/* Topbar */
.topbar{
  display:flex;
  justify-content:flex-end;
  padding:10px 20px;
}

/* Toggle */
.toggle{
  cursor:pointer;
  border:none;
  padding:8px 14px;
  border-radius:999px;
  background:white;
  font-size:13px;
  transition:0.2s;
}

body.dark .toggle{
  background:#333;
  color:#fff;
}

/* Layout */
.shell{
  max-width:1400px;
  margin:auto;
  padding:20px;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
}

/* Panel */
.panel{
  background:var(--panel);
  border-radius:24px;
  padding:20px;
  backdrop-filter:blur(10px);
}

/* Image */
.image-card{
  width:100%;
  height:260px;
  border-radius:28px;
  overflow:hidden;
  margin-bottom:16px;
}

.image-card img{
  width:100%;
  height:100%;
  object-fit:cover;
  transition:0.5s;
}

.image-card:hover img{
  transform:scale(1.05);
}

/* Profile */
.name{font-size:28px;font-weight:800;}
.bio{color:var(--muted);margin-top:6px;}

.stats{
  display:flex;
  gap:20px;
  margin-top:20px;
}

.stat .num{font-size:22px;font-weight:800;}
.stat .lbl{font-size:12px;color:var(--muted);}

/* List */
.poem-list{
  overflow-y:auto;
  max-height:80vh;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.poem-card{
  padding:14px;
  border-radius:999px;
  background:white;
  cursor:pointer;
  border:1px solid rgba(0,0,0,0.05);
  transition:.2s;
}

body.dark .poem-card{
  background:#2a2a2a;
}

.poem-card:hover{
  transform:translateY(-2px);
}

.poem-title{font-weight:600;font-size:14px;}
.poem-meta{font-size:11px;color:var(--muted);}

/* Reader */
.reader{
  position:fixed;
  inset:0;
  display:none;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,0.25);
  padding:20px;
}

.reader.open{display:flex;}

.reader-box{
  background:var(--paper);
  padding:30px;
  border-radius:24px;
  max-width:600px;
  width:100%;
}

.reader-title{
  font-size:26px;
  font-weight:800;
  margin-bottom:20px;
}

.reader-content{
  font-family:Georgia,serif;
  font-size:18px;
  line-height:1.7;
  white-space:pre-line;
}

.close{
  float:right;
  cursor:pointer;
  font-size:18px;
}

/* Responsive */
@media(max-width:1024px){
  .shell{grid-template-columns:1fr;}
}

@media(max-width:600px){
  .shell{padding:12px;}
  .name{font-size:22px;}
  .reader-title{font-size:22px;}
  .reader-content{font-size:16px;}
}
</style>
</head>

<body>

<!-- 🌙 Toggle -->
<div class="topbar">
  <button class="toggle" onclick="toggleDark()">🌙 Dark</button>
</div>

<div class="shell">

  <!-- LEFT -->
  <div class="panel">
    <div class="image-card">
      <img src="https://images.unsplash.com/photo-1503023345310-bd7c1de61c7d">
    </div>

    <div class="name">Sudip</div>
    <div class="bio">Poet · Minimalist · Quiet observer</div>

    <div class="stats">
      <div class="stat">
        <div class="num" id="poemCount">0</div>
        <div class="lbl">Poems</div>
      </div>
      <div class="stat">
        <div class="num" id="wordsCount">0</div>
        <div class="lbl">Words</div>
      </div>
    </div>
  </div>

  <!-- RIGHT -->
  <div class="panel">
    <div class="poem-list" id="poemList"></div>
  </div>

</div>

<!-- Reader -->
<div class="reader" id="reader">
  <div class="reader-box">
    <div class="close" onclick="closeReader()">✕</div>
    <div class="reader-title" id="readerTitle"></div>
    <div class="reader-content" id="readerContent"></div>
  </div>
</div>

<script>

/* 🌙 Dark Mode */
function toggleDark(){
  document.body.classList.toggle("dark");
  localStorage.setItem("darkMode", document.body.classList.contains("dark"));
}

if(localStorage.getItem("darkMode")==="true"){
  document.body.classList.add("dark");
}

/* Poems */
const poems = [
{
title:"The Window",
content:`The window stays open  
even when no one is home.  

Morning leans in slowly,  
touching the quiet corners of the room,  
as if it remembers yesterday.  

Dust floats like soft thoughts—  
and for a moment,  
everything feels enough.`
},

{
title:"Dust",
content:`Dust settles where memory pauses,  
on books we meant to finish.  

Time does not forget—  
it simply becomes quieter.`
},

{
title:"Rain Thought",
content:`Rain does not ask permission.  

It falls,  
and somehow  
we understand.`
},

{
title:"Still",
content:`In the middle of noise  
there is a place that does not move.  

I go there  
to remember myself.`
},

{
title:"Coffee",
content:`The cup cools  
before I finish thinking.  

Some thoughts  
are meant to fade.`
},

{
title:"Night Room",
content:`At night  
even walls breathe slower.  

The room softens  
and listens.`
},

{
title:"Silence",
content:`Silence is not empty.  

It is full  
of everything we avoid.`
},

{
title:"Echo",
content:`I said your name once.  

The silence  
answered better.`
},

{
title:"Waiting",
content:`I am not waiting for someone.  

I am waiting  
to feel whole.`
},

{
title:"Light Again",
content:`Light returns  
even when unnoticed.`
}
];

/* Render */
const list=document.getElementById("poemList");
poems.forEach((p,i)=>{
  const el=document.createElement("div");
  el.className="poem-card";
  el.innerHTML=`<div class="poem-title">${p.title}</div>
                <div class="poem-meta">Poem</div>`;
  el.onclick=()=>openReader(i);
  list.appendChild(el);
});

/* Stats */
document.getElementById("poemCount").textContent=poems.length;

let words=0;
poems.forEach(p=>{
  words+=p.content.split(/\s+/).length;
});
document.getElementById("wordsCount").textContent=words;

/* Reader */
function openReader(i){
  reader.classList.add("open");
  readerTitle.textContent=poems[i].title;
  readerContent.textContent=poems[i].content;
}

function closeReader(){
  reader.classList.remove("open");
}

</script>

</body>
</html>
