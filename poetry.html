<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sudip — Poetry</title>

<style>
:root{
  --bg:#f6f1e9;
  --panel:rgba(251,248,243,0.9);
  --paper:#fffdf9;
  --ink:#1f2328;
  --muted:#6d6d73;
}

/* Base */
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:-apple-system,Segoe UI,Roboto;
  background:linear-gradient(180deg,#fcfbf8,var(--bg));
  color:var(--ink);
}

/* Layout */
.shell{
  max-width:1400px;
  margin:auto;
  padding:20px;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
}

/* Panel */
.panel{
  background:var(--panel);
  border-radius:24px;
  padding:20px;
  backdrop-filter:blur(10px);
}

/* Image */
.image-card{
  width:100%;
  height:260px;
  border-radius:28px;
  overflow:hidden;
  margin-bottom:16px;
}

.image-card img{
  width:100%;
  height:100%;
  object-fit:cover;
  transition:0.5s;
}

.image-card:hover img{
  transform:scale(1.05);
}

/* Profile */
.name{font-size:28px;font-weight:800;}
.bio{color:var(--muted);margin-top:6px;}

.stats{
  display:flex;
  gap:20px;
  margin-top:20px;
}

.stat .num{font-size:22px;font-weight:800;}
.stat .lbl{font-size:12px;color:var(--muted);}

/* List */
.poem-list{
  overflow-y:auto;
  max-height:80vh;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.poem-card{
  padding:14px;
  border-radius:999px;
  background:white;
  cursor:pointer;
  border:1px solid rgba(0,0,0,0.05);
  transition:.2s;
}

.poem-card:hover{
  transform:translateY(-2px);
}

.poem-title{font-weight:600;font-size:14px;}
.poem-meta{font-size:11px;color:var(--muted);}

/* Reader */
.reader{
  position:fixed;
  inset:0;
  display:none;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,0.25);
  padding:20px;
}

.reader.open{display:flex;}

.reader-box{
  background:var(--paper);
  padding:30px;
  border-radius:24px;
  max-width:600px;
  width:100%;
}

.reader-title{
  font-size:26px;
  font-weight:800;
  margin-bottom:20px;
}

.reader-content{
  font-family:Georgia,serif;
  font-size:18px;
  line-height:1.7;
  white-space:pre-line;
}

.close{
  float:right;
  cursor:pointer;
  font-size:18px;
}

/* ✅ RESPONSIVE DESIGN */

/* Tablet */
@media(max-width:1024px){
  .shell{
    grid-template-columns:1fr;
  }

  .image-card{
    height:300px;
  }
}

/* Mobile */
@media(max-width:600px){
  .shell{
    padding:12px;
    gap:12px;
  }

  .panel{
    padding:16px;
  }

  .name{font-size:22px;}
  .reader-title{font-size:22px;}
  .reader-content{font-size:16px;}

  .image-card{
    height:240px;
  }

  .poem-list{
    max-height:none;
  }
}
</style>
</head>

<body>

<div class="shell">

  <!-- LEFT PANEL -->
  <div class="panel">

    <!-- ✅ FIXED IMAGE (NOT RANDOM) -->
    <div class="image-card">
      <img src="https://images.unsplash.com/photo-1503023345310-bd7c1de61c7d" alt="Sudip">
    </div>

    <div class="name">Sudip</div>
    <div class="bio">Poet · Minimalist · Quiet observer</div>

    <div class="stats">
      <div class="stat">
        <div class="num" id="poemCount">0</div>
        <div class="lbl">Poems</div>
      </div>
      <div class="stat">
        <div class="num" id="wordsCount">0</div>
        <div class="lbl">Words</div>
      </div>
    </div>

  </div>

  <!-- RIGHT PANEL -->
  <div class="panel">
    <div class="poem-list" id="poemList"></div>
  </div>

</div>

<!-- Reader -->
<div class="reader" id="reader">
  <div class="reader-box">
    <div class="close" onclick="closeReader()">✕</div>
    <div class="reader-title" id="readerTitle"></div>
    <div class="reader-content" id="readerContent"></div>
  </div>
</div>

<script>

/* Poems */
const poems = [
{title:"The Window",content:`The window stays open
even when no one is home.

Light walks in slowly,
like it remembers me.`},

{title:"Dust",content:`Dust settles where memory pauses.`},

{title:"Rain Thought",content:`Rain falls without asking.`},

{title:"Still",content:`There is a place that does not move.`},

{title:"Coffee",content:`The cup cools before thoughts end.`},

{title:"Footsteps",content:`Someone walked here before me.`},

{title:"Night Room",content:`Even walls breathe slower.`},

{title:"Silence",content:`Silence is full.`},

{title:"Familiar Stranger",content:`I met myself today.`},

{title:"The Chair",content:`The empty chair waits.`},

{title:"Ink",content:`Ink understands.`},

{title:"Morning Delay",content:`Morning arrives quietly.`},

{title:"Echo",content:`Silence repeats.`},

{title:"Between",content:`Truth lives between.`},

{title:"Old Pages",content:`Time smells old.`},

{title:"Half Light",content:`Almost something.`},

{title:"Waiting",content:`Waiting for myself.`},

{title:"Wind",content:`Wind remembers.`},

{title:"Streetlight",content:`Light shrinks the world.`},

{title:"Slow Time",content:`Time slows.`},

{title:"Unsent",content:`Unspoken words stay.`},

{title:"Fading",content:`Things soften away.`},

{title:"Alone",content:`Alone is clarity.`},

{title:"Breath",content:`I forget to breathe.`},

{title:"Edges",content:`Life happens quietly.`},

{title:"Pause",content:`Pause becomes meaning.`},

{title:"Memory Line",content:`It curves back.`},

{title:"Light Again",content:`Light returns.`},

{title:"Soft Ending",content:`Endings rest.`},

{title:"After",content:`Something remains.`}
];

/* Render */
const list = document.getElementById("poemList");

poems.forEach((p,i)=>{
  const el=document.createElement("div");
  el.className="poem-card";
  el.innerHTML=`<div class="poem-title">${p.title}</div>
                <div class="poem-meta">Poem</div>`;
  el.onclick=()=>openReader(i);
  list.appendChild(el);
});

/* Stats */
document.getElementById("poemCount").textContent = poems.length;

let words=0;
poems.forEach(p=>{
  words += p.content.split(/\s+/).filter(Boolean).length;
});
document.getElementById("wordsCount").textContent = words;

/* Reader */
function openReader(i){
  document.getElementById("reader").classList.add("open");
  document.getElementById("readerTitle").textContent=poems[i].title;
  document.getElementById("readerContent").textContent=poems[i].content;
}

function closeReader(){
  document.getElementById("reader").classList.remove("open");
}

</script>

</body>
</html>
